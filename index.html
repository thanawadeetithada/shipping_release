<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shipping</title>

    <link rel="icon" type="image/png" href="logo.png">

    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    
    <meta name="apple-mobile-web-app-title" content="Shipping">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="theme-color" content="#f3f4f6">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f3f4f6; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="appFrame"></iframe>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzQtjx8PEg20Q1JTHPNjFJU3c___hCm5bfzVkCvxWJ8yqGYAGpCIo-Zhq5lgeTciQUbSw/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        
        if (!urlParams.has('page')) {
            urlParams.set('page', 'index');
        }
        
        document.getElementById('appFrame').src = GAS_WEB_APP_URL + "?" + urlParams.toString();
    </script>
</body>
</html>
